# Paths in this document use environment variables. See install.sh for setup.

protocol:
  id: prodds_frozen_2026_02_11
  protocol_version: 1.2
  status: frozen_draft
  updated_at_utc: "2026-02-28T23:30:00Z"
  changelog:
    - "2026-02-11: Added mandatory cross-engine ANALYZE phase."
    - "2026-02-12: Added interim E1 (3-engine) subset freeze and seed audit records."
    - "2026-02-12: Threading baseline changed to physical cores (56), optional full-core 112."
    - "2026-02-12: E2 fast-track metric scope frozen (3 engines, fast subset rule, DuckDB deep-dive target)."
    - "2026-02-12: E3 join-scaling micro-suite completed (3 engines, PostgreSQL excluded, planning-ratio recorded)."
    - "2026-02-12: E5 DuckDB stringification sweep spec frozen (SF10, STR1..STR10, preflight + 3-query timing)."
    - "2026-02-12: E6 DuckDB post-E5 result verification added (deterministic wrapper + SHA256 fingerprinting)."
    - "2026-02-12: E5 pure-data mode enforced (query text invariant; query-layer extensions disabled)."
    - "2026-02-15: E5 switched to strict STR1..STR10 data roots (no str10 fallback) and runtime query-hash provenance."
    - "2026-02-16: Added optional E5_new extended STR sweep (DuckDB, STR1..STR_MAX, default 15)."
    - "2026-02-27: Added SF100 paper-refresh campaign plan, bootstrap copy locations, and disk-aware execution order."
    - "2026-02-28: SF100 frozen standard set recorded (base no-error incl timeout + J/U microsuites) and timing policy updated to 1 warmup / 10 reps (Postgres 3)."
  sources_of_truth:
    - results/20260211T123144Z_experiment0_patch_monetdb/protocol_manifest.json
    - results/20260211T123144Z_experiment0_patch_monetdb/engines_versions.json
    - results/20260211T123144Z_experiment0_patch_monetdb/threads.json
    - results/20260211T123144Z_experiment0_patch_monetdb/engines_control.md
    - results/20260211T123144Z_experiment0_patch_monetdb/queries_inventory.md
    - results/20260211T123144Z_experiment0_patch_monetdb/jan_TODO.md
    - results/20260211T125633Z_preflight_guard_patch/guard_integration_notes.md
    - results/20260211T125633Z_preflight_guard_patch/repo_data_cleanup.md
  supersedes_legacy_policy:
    fixed_32_threads: true
    fixed_512_gib_memory_cap: true
    fixed_30_min_timeout: true
    clickhouse_benchmark_scope: true

environment:
  os:
    pretty_name: "Ubuntu 24.04.4 LTS"
    patch_level_accepted: true
  kernel: "6.14.0-37-generic"
  cpu:
    model: "AMD EPYC 7453 28-Core Processor"
    sockets: 2
    cores_per_socket: 28
    physical_cores: 56
    threads_per_core: 2
    logical_cpus: 112
  memory:
    summary: "Mem: 1.0Ti"

engines:
  scope:
    - duckdb
    - postgres
    - cedardb
    - monetdb
  interim_execution_override:
    active: true
    since_utc: "2026-02-12T00:00:00Z"
    applies_until: "until further notice"
    note: "PostgreSQL is temporarily excluded due to runtime constraints; will be reintroduced for final evaluation."
    included_engines:
      - duckdb
      - cedardb
      - monetdb
    excluded_engines:
      - postgres
  exclusions:
    - clickhouse
  versions:
    duckdb:
      binary_path: /usr/local/bin/duckdb
      version: "v1.4.4 (Andium) 6ddac802ff"
    postgres:
      binary_path: /usr/bin/psql
      version: "psql (PostgreSQL) 16.11 (Ubuntu 16.11-0ubuntu0.24.04.1)"
    cedardb:
      binary_path: /usr/local/bin/cedardb
      version: "CedarDB version v2026-02-03 (2026-01-29, format 0)"
    monetdb:
      binary_path: /usr/bin/mserver5
      control_binary_path: /usr/bin/monetdbd
      cli_binary_path: /usr/bin/monetdb
      version: "MonetDB 5 server 11.55.1 (Dec2025) (64-bit, 128-bit integers)"

paths:
  data_roots:
    tpcds_sf10: $DATA_ROOT/tpcds/sf10
    prodds_sf10_str1: $DATA_ROOT/prodds/sf10/str1
    prodds_sf10_str10: $DATA_ROOT/prodds/sf10/str10
