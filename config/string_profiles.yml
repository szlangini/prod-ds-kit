      - web_returns.wr_item_sk
      - web_returns.wr_refunded_customer_sk
      - web_returns.wr_returning_customer_sk
      - web_returns.wr_web_page_sk
      - web_sales.ws_bill_customer_sk
      - web_sales.ws_item_sk
      - web_sales.ws_ship_customer_sk
      - web_sales.ws_warehouse_sk
      - web_sales.ws_web_page_sk
      - web_sales.ws_web_site_sk
      - web_site.web_site_id
      - web_site.web_site_sk

  classification_codes:
    columns:
      - item.i_brand_id
      - item.i_class_id
      - item.i_category_id
      - item.i_manufact_id
      - item.i_manager_id

  marketing_org_codes:
    columns:
      - store.s_market_id
      - store.s_division_id
      - store.s_company_id
      - call_center.cc_mkt_id
      - call_center.cc_division
      - call_center.cc_company
      - web_site.web_mkt_id
      - web_site.web_company_id

  heavy_string_experimental:
    columns: []
    # Only for stress tests; extend with heavy stringified columns if needed, e.g.:
    # - store.s_number_employees
    # - store.s_floor_space

profiles:
  baseline:
    feature_sets:
      - pk_fk_minimal

  medium_strings:
    feature_sets:
      - pk_fk_minimal
      - classification_codes

  extended_strings:
    feature_sets:
      - pk_fk_minimal
      - classification_codes
      - marketing_org_codes

  max_strings:
    feature_sets:
      - pk_fk_minimal
      - classification_codes
      - marketing_org_codes
      - heavy_string_experimental

level_mapping:
  0: baseline
  1: baseline
  2: baseline
  3: medium_strings
  4: medium_strings
  5: extended_strings
  6: extended_strings
  7: extended_strings
  8: max_strings
  9: max_strings
  10: max_strings
