# Shipped tiers (referenced in the paper):
#   NULL: null_low, fleet_realworld_final (medium/default), null_high
#   MCV:  mcv_low, mcv_fleet_default (medium/default), mcv_high
# Legacy profiles below are preserved for historical reference.

profiles:
  fleet_default:
    # Fraction of eligible non-key columns that receive a non-zero NULL probability.
    column_selection_fraction: 0.30
    # Marker emitted for NULL values in generated data files.
    null_marker: ""
    # Heavy-tailed NULL probability mixture used to derive per-column rates.
    buckets:
      - weight: 0.50
        min: 0.05
        max: 0.15
      - weight: 0.35
        min: 0.15
        max: 0.50
      - weight: 0.12
        min: 0.50
        max: 0.90
      - weight: 0.03
        min: 0.95
        max: 0.995

  fleet_v2_default:
    # Target share of ALL columns (not just eligible) that should receive non-zero NULL probability.
    column_selection_fraction: 0.20
    selection_fraction_scope: overall
    null_marker: ""
    buckets:
      - weight: 0.45
        min: 0.00
        max: 0.01
      - weight: 0.15
        min: 0.01
        max: 0.05
      - weight: 0.10
        min: 0.05
        max: 0.25
      - weight: 0.18
        min: 0.25
        max: 0.75
      - weight: 0.12
        min: 0.90
        max: 0.995

  fleet_v3_default:
    # Target share of ALL columns that receive non-zero NULL probability.
    column_selection_fraction: 0.16
    selection_fraction_scope: overall
    null_marker: ""
    buckets:
      - weight: 0.45
        min: 0.00
        max: 0.01
      - weight: 0.22
        min: 0.01
        max: 0.05
      - weight: 0.15
        min: 0.05
        max: 0.20
      - weight: 0.08
        min: 0.20
        max: 0.50
      - weight: 0.10
        min: 0.90
        max: 0.99

  null_low:
    # Low sparsity tier: fewer columns selected, weight shifted toward low NULL probabilities.
    column_selection_fraction: 0.12
    selection_fraction_scope: overall
    null_marker: ""
    exclude_tables:
      - date_dim
      - time_dim
    exclude_qualified_columns:
      - item.i_category
      - item.i_class
      - item.i_brand
      - item.i_color
      - item.i_size
      - item.i_units
      - item.i_current_price
      - store.s_state
