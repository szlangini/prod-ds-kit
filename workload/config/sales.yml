# Base: store_sales fact table
base: sales
# Base join width (documentation only; script uses formula)
b: 10
# Columns that identify a row for rejoin in USING(...)
join_keys: [ss_ticket_number, ss_item_sk]

# Measure + allowed aggregates (ANSI-safe)
measure: ss_net_paid
agg_cycle: [SUM, COUNT, AVG, MIN, MAX]

# Curated, FIXED order of LOD group keys (all projected into 'base')
group_keys:
  - i_brand
  - i_category
  - store_state
  - store_name
  - cust_state
  - p_promo_name
  - p_channel_email
  - p_channel_catalog
  - p_channel_tv
  - cd_education_status
  - cd_credit_rating
  - cd_dep_count
  - hd_buy_potential
  - hd_dep_count
  - hd_vehicle_count
  - income_band
  - sold_year
  - sold_moy
  - sold_dow
  - sold_week_seq
  - i_class
  - i_manufact
  - i_size
  - i_color
  - cust_city
  - cust_county
  - cust_zip
  - store_company_name
  - store_division_name

# ---- NEW: segment tagging (cohort) configuration ----
filt_mode: cohort
# Deterministic, safe, and selective predicates; cycled for m>0
cohort_predicates:
  - "i_category IN ('Home','Electronics')"
  - "i_brand LIKE 'Brand#1%'"
  - "i_color IN ('red','blue','black')"
  - "(i_manufact_id % 5) IN (0,1)"      # requires i_manufact_id in base CTE
  - "p_channel_email = 'Y'"
  - "p_channel_tv = 'Y'"
  - "p_channel_catalog = 'Y'"
  - "store_state IN ('CA','NY','TX')"
  - "cust_state IN ('CA','TX','NY')"
  - "cust_zip LIKE '9%'"
  - "cd_credit_rating IN ('Good','Excellent')"
  - "cd_education_status LIKE '%Degree%'"
  - "hd_dep_count >= 2"
  - "hd_vehicle_count >= 2"
  - "(income_band % 2) = 0"
  - "sold_year BETWEEN 1998 AND 2002"
  - "sold_moy IN (6,12)"
  - "sold_dow IN (1,7)"
  - "t_am_pm = 'AM'"
  - "t_hour BETWEEN 9 AND 17"
  - "(sold_week_seq % 2) = 0"
  - "i_size IS NOT NULL"

# Emit 0/1 segment flags in final SELECT (COALESCE)
include_segment_flags: true

# Safety caps
cap_joins: 10000
max_filts: 200
